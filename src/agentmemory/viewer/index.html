<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentMemory Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f8fa;
      color: #18202a;
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, .06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    p {
      margin: 0;
      color: #667085;
    }
    code {
      background: #f1f4f7;
      border: 1px solid #d7dde5;
      border-radius: 6px;
      padding: 2px 5px;
    }
  </style>
</head>
<body>
  <main>
    <h1>AgentMemory Viewer</h1>
    <p>The React viewer build was not found. Run <code>npm run build</code> in <code>viewer/</code>, then restart <code>agentmemory serve</code>.</p>
  </main>
</body>
</html>
